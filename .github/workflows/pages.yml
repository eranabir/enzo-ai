name: Deploy Landing Page

# Publishes the docs/ landing page to GitHub Pages whenever it changes —
# no full release required. Releases stamp the version + deploy via release.yml;
# this handles everyday landing-page updates.

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  pages: write
  id-token: write
  contents: read

# Never run two Pages deploys at once (release.yml also deploys Pages).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload docs/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
