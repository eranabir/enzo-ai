name: Deploy Landing Page

# Publishes the site/ landing page to GitHub Pages.
#
# Version-badge stamping only happens after a release actually succeeds —
# triggered by the Release workflow's own completion, not by the version-bump
# commit landing on master. A push that only bumps package.json can't deploy
# a "vX.Y now available" badge before the installers it promises actually
# exist (previously this ran on every master push touching package.json,
# regardless of whether the multi-platform release build behind it passed).
#
# Everyday site/ edits unrelated to a release still deploy immediately via
# the plain push trigger below (using whatever version is already committed).

on:
  push:
    branches: [master]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write
  contents: read

# Never run two Pages deploys at once (release.yml also deploys Pages).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    # For workflow_run: only deploy if the Release run it's reacting to actually succeeded.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_run checks out the trigger workflow's own ref by default,
          # not the commit the Release run actually built — pin explicitly.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - name: Stamp current version into the landing page badge
        run: |
          MINOR=$(node -p "require('./package.json').version.split('.').slice(0,2).join('.')")
          sed -i -E "s#v[0-9]+\.[0-9]+ now available#v${MINOR} now available#g" site/index.html
          echo "Stamped landing page badge with v${MINOR}"
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
