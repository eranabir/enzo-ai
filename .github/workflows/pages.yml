name: Deploy Landing Page

# Publishes the site/ landing page to GitHub Pages whenever it changes —
# no full release required. Releases stamp the version + deploy via release.yml;
# this handles everyday landing-page updates.

on:
  push:
    branches: [master]
    paths:
      - 'site/**'
      - 'package.json'          # release commits bump this → re-stamp + redeploy
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  pages: write
  id-token: write
  contents: read

# Never run two Pages deploys at once (release.yml also deploys Pages).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Stamp current version into the landing page badge
        run: |
          MINOR=$(node -p "require('./package.json').version.split('.').slice(0,2).join('.')")
          sed -i -E "s#v[0-9]+\.[0-9]+ now available#v${MINOR} now available#g" site/index.html
          echo "Stamped landing page badge with v${MINOR}"
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
