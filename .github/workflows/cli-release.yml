name: CLI Release

on:
  # Trigger with: git tag cli-v0.1.0 && git push --tags
  push:
    tags:
      - "cli-v*"
  # Or trigger manually from the GitHub Actions UI
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Step 1: Compile TypeScript → dist/
      - name: Build CLI (tsc)
        run: yarn workspace @enzo-ai/cli build

      # Step 2: Bundle all JS deps into a single file with ncc
      # This makes pkg's job trivial — no module resolution needed at runtime.
      - name: Bundle with ncc
        run: npx ncc build cli/dist/index.js -o cli/dist/bundle -q

      # Step 3: Compile the bundle into standalone executables for each platform.
      # @yao-pkg/pkg is the maintained fork of the original Vercel pkg.
      # The CLI has no native modules so cross-compilation works perfectly.
      - name: Install pkg
        run: npm install -g @yao-pkg/pkg

      - name: Compile binaries
        run: |
          pkg cli/dist/bundle/index.js \
            --targets node22-win-x64,node22-macos-x64,node22-macos-arm64,node22-linux-x64,node22-linux-arm64 \
            --output cli/dist/enzo-ai \
            --compress Brotli

      # Step 4: Rename to clear platform-specific names
      - name: Rename outputs
        run: |
          cd cli/dist
          mv enzo-ai-win.exe        enzo-ai-windows-x64.exe   2>/dev/null || true
          mv enzo-ai-macos          enzo-ai-macos-x64          2>/dev/null || true
          mv enzo-ai-macos-arm64    enzo-ai-macos-arm64        2>/dev/null || true
          mv enzo-ai-linux          enzo-ai-linux-x64          2>/dev/null || true
          mv enzo-ai-linux-arm64    enzo-ai-linux-arm64        2>/dev/null || true
          ls -lh enzo-ai-*

      # Step 5: Create / update the GitHub Release and attach all binaries
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Enzo AI CLI ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body: |
            ## Enzo AI CLI — ${{ github.ref_name }}

            Standalone command-line client for Enzo AI. No Node.js required.

            ### Install

            **Windows**
            ```powershell
            # Download enzo-ai-windows-x64.exe, then:
            enzo-ai-windows-x64.exe login
            enzo-ai-windows-x64.exe chat
            ```

            **macOS**
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/enzo-ai-macos-x64 -o enzo-ai
            chmod +x enzo-ai && sudo mv enzo-ai /usr/local/bin/
            enzo-ai login
            ```

            **Linux**
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/enzo-ai-linux-x64 -o enzo-ai
            chmod +x enzo-ai && sudo mv enzo-ai /usr/local/bin/
            enzo-ai login
            ```

            ### Usage
            ```
            enzo-ai status           # check server + model
            enzo-ai login            # sign in
            enzo-ai chat             # interactive session
            enzo-ai chat "message"   # one-shot
            enzo-ai conversations    # list chats
            enzo-ai memories         # list memories
            enzo-ai whoami           # your profile
            ```

            > Make sure Enzo AI is running on the same machine (default: http://127.0.0.1:1616)
          files: |
            cli/dist/enzo-ai-windows-x64.exe
            cli/dist/enzo-ai-macos-x64
            cli/dist/enzo-ai-macos-arm64
            cli/dist/enzo-ai-linux-x64
            cli/dist/enzo-ai-linux-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
