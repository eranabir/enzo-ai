name: Release

# One tag → one GitHub Release with these assets:
#
#  INSTALLERS (what users download)
#   enzo-ai-installer-windows.exe       ← downloads + installs server + chosen clients
#   enzo-ai-installer-macos-x64.dmg
#   enzo-ai-installer-macos-arm64.dmg
#   enzo-ai-installer-linux.AppImage
#
#  SERVER PACKAGES (downloaded by installer at install time)
#   enzo-ai-windows-{version}.exe       ← Electron tray app (server)
#   enzo-ai-macos-{version}-x64.dmg
#   enzo-ai-macos-{version}-arm64.dmg
#   enzo-ai-linux-{version}.AppImage
#   enzo-ai-linux-amd64.deb
#
#  CLI CLIENTS (downloaded by installer if CLI option selected)
#   enzo-ai-cli-windows-x64.exe
#   enzo-ai-cli-macos-x64
#   enzo-ai-cli-macos-arm64
#   enzo-ai-cli-linux-x64
#   enzo-ai-cli-linux-arm64
#
# Secrets:  GH_TOKEN (PAT Contents:write), GITHUB_TOKEN (auto)

on:
  push:
    tags:
      - 'v*'

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # WINDOWS — installer + server package + CLI binary
  # ════════════════════════════════════════════════════════════════════════════
  windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: ${{ env.LOCALAPPDATA }}\electron\Cache
          key: electron-win-${{ hashFiles('desktop/package.json') }}
      - name: Install dependencies
        run: yarn install --frozen-lockfile --network-timeout 100000
      - run: yarn download:ollama
      - run: yarn build
      - run: yarn build:desktop
      - run: yarn build:installer

      - name: Package server
        run: yarn workspace @enzo-ai/desktop package:win

      - name: Build CLI binary
        run: |
          npm install -g @yao-pkg/pkg
          pkg cli/dist/bundle/index.js --targets node20-win-x64 --output cli/dist/enzo-ai-cli-windows-x64.exe --compress Brotli

      - name: Package installer
        run: yarn workspace @enzo-ai/installer package:win

      - name: Save artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-assets
          retention-days: 1
          path: |
            desktop/dist/enzo-ai-windows-*.exe
            cli/dist/enzo-ai-cli-windows-x64.exe
            installer/dist/enzo-ai-installer-windows.exe

  # ════════════════════════════════════════════════════════════════════════════
  # macOS
  # ════════════════════════════════════════════════════════════════════════════
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/electron
          key: electron-mac-${{ hashFiles('desktop/package.json') }}
      - name: Install dependencies
        run: yarn install --frozen-lockfile --network-timeout 100000
      - run: yarn download:ollama
      - run: yarn build
      - run: yarn build:desktop
      - run: yarn build:installer

      - name: Package server
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: yarn workspace @enzo-ai/desktop package:mac

      - name: Build CLI binaries
        run: |
          npm install -g @yao-pkg/pkg
          pkg cli/dist/bundle/index.js --targets node20-macos-x64  --output cli/dist/enzo-ai-cli-macos-x64  --compress Brotli
          pkg cli/dist/bundle/index.js --targets node20-macos-arm64 --output cli/dist/enzo-ai-cli-macos-arm64 --compress Brotli

      - name: Package installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: yarn workspace @enzo-ai/installer package:mac

      - name: Save artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-assets
          retention-days: 1
          path: |
            desktop/dist/enzo-ai-macos-*.dmg
            cli/dist/enzo-ai-cli-macos-x64
            cli/dist/enzo-ai-cli-macos-arm64
            installer/dist/enzo-ai-installer-macos-*.dmg

  # ════════════════════════════════════════════════════════════════════════════
  # LINUX
  # ════════════════════════════════════════════════════════════════════════════
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - name: Cache Electron binary + builder tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: electron-linux-${{ hashFiles('desktop/package.json') }}
      - run: sudo apt-get install -y libarchive-tools rpm fakeroot
      - name: Install dependencies
        run: yarn install --frozen-lockfile --network-timeout 100000
      - run: yarn download:ollama
      - run: yarn build
      - run: yarn build:desktop
      - run: yarn build:installer

      - name: Package server
        run: yarn workspace @enzo-ai/desktop package:linux

      - name: Build CLI binaries
        run: |
          npm install -g @yao-pkg/pkg
          pkg cli/dist/bundle/index.js --targets node20-linux-x64  --output cli/dist/enzo-ai-cli-linux-x64  --compress Brotli
          pkg cli/dist/bundle/index.js --targets node20-linux-arm64 --output cli/dist/enzo-ai-cli-linux-arm64 --compress Brotli

      - name: Package installer
        run: yarn workspace @enzo-ai/installer package:linux

      - name: Save artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-assets
          retention-days: 1
          path: |
            desktop/dist/enzo-ai-linux-*.AppImage
            desktop/dist/enzo-ai-linux-*.deb
            cli/dist/enzo-ai-cli-linux-x64
            cli/dist/enzo-ai-cli-linux-arm64
            installer/dist/enzo-ai-installer-linux.AppImage

  # ════════════════════════════════════════════════════════════════════════════
  # PUBLISH — runs only when ALL jobs above pass
  # ════════════════════════════════════════════════════════════════════════════
  publish:
    needs: [windows, macos, linux, docker-manifest]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release and upload all assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ════════════════════════════════════════════════════════════════════════════
  # DOCKER — native build per arch (no QEMU), merged into one manifest
  #
  # Each platform runs on its own native runner:
  #   amd64 → ubuntu-latest        (x64 GitHub runner)
  #   arm64 → ubuntu-24.04-arm     (native ARM GitHub runner)
  #
  # Both push a platform-specific image tag, then docker-manifest
  # merges them into ghcr.io/…/enzo-ai:latest and :version
  # ════════════════════════════════════════════════════════════════════════════
  docker:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            tag-suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            tag-suffix: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          # Push a temporary per-arch tag; merged into final tags by docker-manifest job
          tags: ghcr.io/${{ github.repository_owner }}/enzo-ai:${{ matrix.tag-suffix }}

  # Combine the two platform images into a single multi-arch manifest
  docker-manifest:
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Merge into multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${{ github.repository_owner }}/enzo-ai:latest \
            --tag ghcr.io/${{ github.repository_owner }}/enzo-ai:${{ steps.meta.outputs.version }} \
            ghcr.io/${{ github.repository_owner }}/enzo-ai:amd64 \
            ghcr.io/${{ github.repository_owner }}/enzo-ai:arm64
