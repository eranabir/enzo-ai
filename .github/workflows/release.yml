name: Release

# One tag → one GitHub Release with these assets:
#
#  INSTALLERS (what users download)
#   enzo-ai-installer-windows.exe       ← downloads + installs server + chosen clients
#   enzo-ai-installer-macos-x64.dmg
#   enzo-ai-installer-macos-arm64.dmg
#   enzo-ai-installer-linux.AppImage
#
#  SERVER PACKAGES (downloaded by installer at install time)
#   enzo-ai-windows-{version}.exe       ← Electron tray app (server)
#   enzo-ai-macos-{version}-x64.dmg
#   enzo-ai-macos-{version}-arm64.dmg
#   enzo-ai-linux-{version}.AppImage
#   enzo-ai-linux-amd64.deb
#
#  CLI CLIENTS (downloaded by installer if CLI option selected)
#   enzo-ai-cli-windows-x64.exe
#   enzo-ai-cli-macos-x64
#   enzo-ai-cli-macos-arm64
#   enzo-ai-cli-linux-x64
#   enzo-ai-cli-linux-arm64
#
# Secrets:  GH_TOKEN (PAT Contents:write), GITHUB_TOKEN (auto)

on:
  push:
    tags:
      - 'v*'

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # WINDOWS — installer + server package + CLI binary
  # ════════════════════════════════════════════════════════════════════════════
  windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: yarn download:ollama
      - run: yarn build

      - name: Build server package → enzo-ai-windows-{version}.exe
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: yarn workspace @enzo-ai/desktop dist:win:publish

      - name: Build CLI binary → enzo-ai-cli-windows-x64.exe
        run: |
          npm install -g @yao-pkg/pkg
          pkg cli/dist/bundle/index.js --targets node20-win-x64 --output cli/dist/enzo-ai-cli-windows-x64.exe --compress Brotli

      - name: Upload CLI binary
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: cli/dist/enzo-ai-cli-windows-x64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build installer → enzo-ai-installer-windows.exe
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: yarn workspace @enzo-ai/installer dist:win:publish

  # ════════════════════════════════════════════════════════════════════════════
  # macOS — installer + server packages + CLI binaries
  # ════════════════════════════════════════════════════════════════════════════
  macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: yarn download:ollama
      - run: yarn build

      - name: Build server packages → enzo-ai-macos-{version}-{arch}.dmg
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: yarn workspace @enzo-ai/desktop dist:mac:publish

      - name: Build CLI binaries
        run: |
          npm install -g @yao-pkg/pkg
          pkg cli/dist/bundle/index.js --targets node20-macos-x64  --output cli/dist/enzo-ai-cli-macos-x64  --compress Brotli
          pkg cli/dist/bundle/index.js --targets node20-macos-arm64 --output cli/dist/enzo-ai-cli-macos-arm64 --compress Brotli

      - name: Upload CLI binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            cli/dist/enzo-ai-cli-macos-x64
            cli/dist/enzo-ai-cli-macos-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build installer → enzo-ai-installer-macos-{arch}.dmg
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: yarn workspace @enzo-ai/installer dist:mac:publish

  # ════════════════════════════════════════════════════════════════════════════
  # LINUX — installer + server packages + CLI binaries
  # ════════════════════════════════════════════════════════════════════════════
  linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - run: sudo apt-get install -y libarchive-tools rpm fakeroot
      - run: yarn install --frozen-lockfile
      - run: yarn download:ollama
      - run: yarn build

      - name: Build server packages → enzo-ai-linux-{version}.AppImage + .deb
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: yarn workspace @enzo-ai/desktop dist:linux:publish

      - name: Build CLI binaries
        run: |
          npm install -g @yao-pkg/pkg
          pkg cli/dist/bundle/index.js --targets node20-linux-x64  --output cli/dist/enzo-ai-cli-linux-x64  --compress Brotli
          pkg cli/dist/bundle/index.js --targets node20-linux-arm64 --output cli/dist/enzo-ai-cli-linux-arm64 --compress Brotli

      - name: Upload CLI binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            cli/dist/enzo-ai-cli-linux-x64
            cli/dist/enzo-ai-cli-linux-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build installer → enzo-ai-installer-linux.AppImage
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: yarn workspace @enzo-ai/installer dist:linux:publish

  # ════════════════════════════════════════════════════════════════════════════
  # DOCKER — native build per arch (no QEMU), merged into one manifest
  #
  # Each platform runs on its own native runner:
  #   amd64 → ubuntu-latest        (x64 GitHub runner)
  #   arm64 → ubuntu-24.04-arm     (native ARM GitHub runner)
  #
  # Both push a platform-specific image tag, then docker-manifest
  # merges them into ghcr.io/…/enzo-ai:latest and :version
  # ════════════════════════════════════════════════════════════════════════════
  docker:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            tag-suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            tag-suffix: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          # Push a temporary per-arch tag; merged into final tags by docker-manifest job
          tags: ghcr.io/${{ github.repository_owner }}/enzo-ai:${{ matrix.tag-suffix }}

  # Combine the two platform images into a single multi-arch manifest
  docker-manifest:
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Merge into multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${{ github.repository_owner }}/enzo-ai:latest \
            --tag ghcr.io/${{ github.repository_owner }}/enzo-ai:${{ steps.meta.outputs.version }} \
            ghcr.io/${{ github.repository_owner }}/enzo-ai:amd64 \
            ghcr.io/${{ github.repository_owner }}/enzo-ai:arm64
