name: Release

# One tag → one GitHub Release with these assets:
#
#  INSTALLERS (what users download)
#   enzo-ai-installer-windows.exe       ← downloads + installs server + chosen clients
#   enzo-ai-installer-macos-x64.dmg
#   enzo-ai-installer-macos-arm64.dmg
#   enzo-ai-installer-linux.AppImage
#
#  SERVER PACKAGES (downloaded by installer at install time)
#   enzo-ai-windows-{version}.exe       ← Electron tray app (server)
#   enzo-ai-macos-{version}-x64.dmg
#   enzo-ai-macos-{version}-arm64.dmg
#   enzo-ai-linux-{version}.AppImage
#   enzo-ai-linux-amd64.deb
#
#  CLI CLIENTS (downloaded by installer if CLI option selected)
#   enzo-ai-cli-windows-x64.exe
#   enzo-ai-cli-macos-x64
#   enzo-ai-cli-macos-arm64
#   enzo-ai-cli-linux-x64
#   enzo-ai-cli-linux-arm64
#
# Secrets:  GH_TOKEN (PAT Contents:write), GITHUB_TOKEN (auto)

on:
  push:
    tags:
      - 'v*'

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # WINDOWS — one installer, includes everything. CLI checkbox on first run.
  # ════════════════════════════════════════════════════════════════════════════
  windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      # node-gyp (rebuilds better-sqlite3) needs distutils, removed from Python 3.12.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: ${{ env.LOCALAPPDATA }}\electron\Cache
          key: electron-win-${{ hashFiles('desktop/package.json') }}
      - run: yarn install --frozen-lockfile --network-timeout 100000
      - run: yarn download:ollama
      - run: yarn build:all
      - name: Package
        run: yarn workspace @enzo-ai/desktop package:win
      - name: Save artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-assets
          retention-days: 1
          path: desktop/dist/enzo-ai-windows-*.exe
          if-no-files-found: error

  # ════════════════════════════════════════════════════════════════════════════
  # macOS arm64 — Apple Silicon (separate runner = no hdiutil conflict)
  # ════════════════════════════════════════════════════════════════════════════
  macos-arm64:
    runs-on: macos-latest   # ARM runner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      # node-gyp (rebuilds better-sqlite3) needs distutils, removed from Python 3.12.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/electron
          key: electron-mac-arm64-${{ hashFiles('desktop/package.json') }}
      - run: yarn install --frozen-lockfile --network-timeout 100000
      - run: yarn download:ollama
      - run: yarn build:all
      # Build the macOS .app icon from the project logo (icon.png). electron-builder
      # expects assets/icon.icns; iconutil (macOS-only) produces it. Without this the
      # app falls back to the default Electron icon.
      - name: Generate macOS app icon (.icns)
        run: |
          cd desktop/assets
          rm -rf icon.iconset && mkdir icon.iconset
          sips -z 16 16     icon.png --out icon.iconset/icon_16x16.png
          sips -z 32 32     icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32     icon.png --out icon.iconset/icon_32x32.png
          sips -z 64 64     icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128   icon.png --out icon.iconset/icon_128x128.png
          sips -z 256 256   icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256   icon.png --out icon.iconset/icon_256x256.png
          sips -z 512 512   icon.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512   icon.png --out icon.iconset/icon_512x512.png
          sips -z 1024 1024 icon.png --out icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o icon.icns
          rm -rf icon.iconset
          echo "Generated:" && ls -la icon.icns
      # Decode the App Store Connect API key (.p8) from a base64 secret to a file
      # when signing secrets are configured. If they aren't, the build falls back
      # to ad-hoc signing automatically (see electron-builder.config.js).
      - name: Prepare Apple signing
        env:
          CSC_LINK_SECRET: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          # Print presence (lengths only — never the values) so a misconfigured
          # secret is obvious in the log.
          echo "Signing secret lengths (0 = missing):"
          echo "  CSC_LINK=${#CSC_LINK_SECRET}  CSC_KEY_PASSWORD=${#CSC_KEY_PASSWORD}"
          echo "  APPLE_API_KEY_P8=${#APPLE_API_KEY_P8}  APPLE_API_KEY_ID=${#APPLE_API_KEY_ID}  APPLE_API_ISSUER=${#APPLE_API_ISSUER}"
          if [ -n "$CSC_LINK_SECRET" ] && [ -n "$APPLE_API_KEY_P8" ]; then
            printf '%s' "$APPLE_API_KEY_P8" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
            echo "==> Signing secrets present — Developer-ID signing + notarization."
          else
            echo "::warning::No Apple signing secrets found — building AD-HOC. The macOS app will be reported as 'damaged'/unidentified. Add CSC_LINK, CSC_KEY_PASSWORD, APPLE_API_KEY_P8, APPLE_API_KEY_ID, APPLE_API_ISSUER as Repository secrets."
          fi
      - name: Package (arm64)
        env:
          # Empty when the secrets aren't set → config uses the ad-hoc fallback.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ runner.temp }}/AuthKey.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: yarn workspace @enzo-ai/desktop package:mac:arm64
      - name: Save artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-assets
          retention-days: 1
          path: desktop/dist/enzo-ai-macos-*-arm64.dmg
          if-no-files-found: error

  # ════════════════════════════════════════════════════════════════════════════
  # LINUX — .deb only (no installer; Linux users install via package manager)
  # ════════════════════════════════════════════════════════════════════════════
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      # node-gyp (rebuilds better-sqlite3) needs distutils, removed from Python 3.12.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache Electron binary + builder tools + fpm gem
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            /var/lib/gems
            /usr/local/lib/ruby/gems
          key: electron-linux-${{ hashFiles('desktop/package.json') }}
      - name: Install fpm via Ruby (avoids flaky GitHub CDN download)
        run: |
          sudo apt-get install -y ruby ruby-dev build-essential
          sudo gem install fpm --no-document
      - name: Install dependencies
        run: yarn install --frozen-lockfile --network-timeout 100000
      - run: yarn download:ollama
      - run: yarn build:all
      - name: Package
        env:
          USE_SYSTEM_FPM: true
        run: yarn workspace @enzo-ai/desktop package:linux
      - name: Save artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-assets
          retention-days: 1
          path: desktop/dist/enzo-ai-linux-*.deb
          if-no-files-found: error

  # ════════════════════════════════════════════════════════════════════════════
  # PUBLISH — runs only when ALL jobs above pass
  # ════════════════════════════════════════════════════════════════════════════
  publish:
    needs: [windows, macos-arm64, linux, docker-manifest]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: "*-assets"   # skip internal docker *.dockerbuild artifacts
          merge-multiple: true

      - name: List release assets
        run: cd release-assets && ls -la

      - name: Create GitHub Release and upload all assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ════════════════════════════════════════════════════════════════════════════
  # DOCKER — native build per arch (no QEMU), merged into one manifest
  #
  # Each platform runs on its own native runner:
  #   amd64 → ubuntu-latest        (x64 GitHub runner)
  #   arm64 → ubuntu-24.04-arm     (native ARM GitHub runner)
  #
  # Both push a platform-specific image tag, then docker-manifest
  # merges them into ghcr.io/…/enzo-ai:latest and :version
  # ════════════════════════════════════════════════════════════════════════════
  docker:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            tag-suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            tag-suffix: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          # Push a temporary per-arch tag; merged into final tags by docker-manifest job
          tags: ghcr.io/${{ github.repository_owner }}/enzo-ai:${{ matrix.tag-suffix }}

  # Combine the two platform images into a single multi-arch manifest
  docker-manifest:
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Merge into multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${{ github.repository_owner }}/enzo-ai:latest \
            --tag ghcr.io/${{ github.repository_owner }}/enzo-ai:${{ steps.meta.outputs.version }} \
            ghcr.io/${{ github.repository_owner }}/enzo-ai:amd64 \
            ghcr.io/${{ github.repository_owner }}/enzo-ai:arm64

# The landing page is published by .github/workflows/pages.yml (runs on master,
# which the github-pages environment allows). A release commit bumps package.json
# on master, which triggers that workflow to re-stamp the version and redeploy.
