appId: com.enzo-ai.installer
productName: Enzo AI Installer
electronVersion: "34.5.8"
extraMetadata:
  main: dist/installer/main.js

# Tiny — only the UI. Components are downloaded from GitHub at install time.
files:
  - dist/installer/main.js
  - dist/installer/preload.js
  - src/installer/index.html
  - package.json

win:
  icon: assets/icon.ico
  target:
    - target: nsis
      arch: [x64]

nsis:
  artifactName: "enzo-ai-installer-windows.${ext}"
  oneClick: false
  allowToChangeInstallationDirectory: false
  runAfterFinish: true

mac:
  icon: assets/icon.icns
  category: public.app-category.utilities
  target:
    - target: dmg
      arch: [x64, arm64]

dmg:
  artifactName: "enzo-ai-installer-macos-${arch}.${ext}"
