appId: com.enzo-ai.app
productName: Enzo AI
copyright: "© 2025 Enzo AI"
electronVersion: "34.5.8"

files:
  - dist/**/*
  - package.json

extraResources:
  # Tray + app icons
  - from: "assets"
    to: "assets"
    filter: ["tray*", "icon*"]
  # ncc-bundled server (single JS file — all pure-JS deps included)
  - from: "../server/dist/bundle"
    to: "server/bundle"
    filter: ["**/*"]
  # better-sqlite3 native module (can't be bundled by ncc, shipped separately)
  # @electron/rebuild rebuilds this for Electron's Node ABI before packaging.
  - from: "../node_modules/better-sqlite3"
    to: "node_modules/better-sqlite3"
    filter: ["**/*"]
  # Built web assets served by the server
  - from: "../web/dist"
    to: "web/dist"
    filter: ["**/*"]
  # Bundled Ollama binary
  - from: "resources/ollama"
    to: "ollama"
    filter: ["**/*"]

# Rebuild native modules (better-sqlite3) for Electron's Node version
npmRebuild: true
buildDependenciesFromSource: false

# publish:   ← uncomment when GitHub repo is set in package.json
#   - provider: github
#     releaseType: release

# ── macOS ────────────────────────────────────────────────────────────────────
mac:
  category: public.app-category.productivity
  icon: assets/icon.icns   # generated by `yarn create:icons` on macOS
  target:
    - target: dmg
      arch: [x64, arm64]

dmg:
  title: "Install Enzo"
  window:
    width: 540
    height: 380

# ── Windows ──────────────────────────────────────────────────────────────────
win:
  icon: assets/icon.ico
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  runAfterFinish: true

# ── Linux ────────────────────────────────────────────────────────────────────
linux:
  icon: assets/icon.png
  category: Utility
  target:
    - target: AppImage
      arch: [x64, arm64]
    - target: deb
      arch: [x64]
