appId: com.enzo-ai.app
productName: Enzo AI
copyright: "© 2025 Enzo AI"
electronVersion: "34.5.8"


# NOTE: electron-builder's output also lands in dist/ (mac-arm64/, *.dmg, …).
# Globbing dist/**/* would recursively package the build's own output back into
# the asar (a nested Electron.app + the dmg → ~900 MB of bloat). The compiled
# main process is only the top-level dist/*.js files, so match those explicitly.
files:
  - dist/*.js
  - src/setup.html
  - package.json


# ── extraFiles: placed directly in the install root (same dir as Enzo AI.exe)
# The enzo-ai wrapper scripts live here so they're on PATH alongside the app.
extraFiles:
  - from: "cli-wrappers/enzo-ai.cmd"
    to: "enzo-ai.cmd"          # Windows: enzo-ai.cmd in install dir
  - from: "cli-wrappers/enzo-ai"
    to: "enzo-ai"              # macOS/Linux: enzo-ai shell script

extraResources:
  # Tray + app icons
  - from: "assets"
    to: "assets"
    filter: ["tray*", "icon*"]
  # ncc-bundled CLI (run via ELECTRON_RUN_AS_NODE=1 by the wrapper scripts)
  - from: "../cli/dist/bundle"
    to: "cli/bundle"
    filter: ["**/*"]
  # ncc-bundled server
  - from: "../server/dist/bundle"
    to: "server/bundle"
    filter: ["**/*"]
  # better-sqlite3 native module + runtime deps
  - from: "../node_modules/better-sqlite3"
    to: "node_modules/better-sqlite3"
    filter: ["**/*"]
  - from: "../node_modules/bindings"
    to: "node_modules/bindings"
    filter: ["**/*"]
  - from: "../node_modules/file-uri-to-path"
    to: "node_modules/file-uri-to-path"
    filter: ["**/*"]
  # Built web assets served by the server
  - from: "../web/dist"
    to: "web/dist"
    filter: ["**/*"]
  # Bundled Ollama binary
  - from: "resources/ollama"
    to: "ollama"
    filter: ["**/*"]

# Rebuild native modules (better-sqlite3) for Electron's Node version
npmRebuild: true
buildDependenciesFromSource: false

# ── macOS ────────────────────────────────────────────────────────────────────
mac:
  category: public.app-category.productivity
  icon: assets/icon.icns
  # ── Ad-hoc signing (stopgap until Apple Developer ID + notarization) ──
  # `sign` points at a custom hook that runs `codesign --sign -`, giving the app
  # an ad-hoc signature. Gatekeeper then reports "unidentified developer" (which
  # the user can bypass via right-click → Open → Open Anyway) instead of the
  # dead-end "damaged and can't be opened" verdict it gives unsigned apps.
  #
  # To switch to real Developer ID signing + notarization later:
  #   1. remove the `sign:` line below
  #   2. set hardenedRuntime: true and notarize: true
  #   3. provide CSC_LINK/CSC_KEY_PASSWORD + APPLE_ID/APPLE_APP_SPECIFIC_PASSWORD/
  #      APPLE_TEAM_ID in CI (and drop CSC_IDENTITY_AUTO_DISCOVERY: false)
  sign: build/ad-hoc-sign.js
  # Hardened runtime is only needed for notarization; leaving it off keeps the
  # ad-hoc-signed app launching cleanly (no library-validation enforcement on the
  # bundled native module / ollama binary).
  hardenedRuntime: false
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false
  target:
    - target: dmg

dmg:
  artifactName: "enzo-ai-macos-${version}-${arch}.${ext}"
  title: "Install Enzo AI"
  window:
    width: 540
    height: 380

# ── Windows ──────────────────────────────────────────────────────────────────
win:
  icon: assets/icon.ico
  target:
    - target: nsis
      arch: [x64]

nsis:
  artifactName: "enzo-ai-windows-${version}.${ext}"
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  runAfterFinish: true
  include: "build/installer.nsh"

# ── Linux ────────────────────────────────────────────────────────────────────
linux:
  icon: assets/icon.png
  category: Utility
  target:
    - target: deb
      arch: [x64]

deb:
  artifactName: "enzo-ai-linux-${arch}.${ext}"
