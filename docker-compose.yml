# Enzo AI — self-hosted local AI
#
#   docker compose up -d        →  open http://localhost:1616
#
# One container runs everything: the server, the web UI, and a bundled Ollama
# (the official build, which already includes GPU runners). Your data — SQLite
# DB, uploads, downloaded models — lives in the `enzo-data` volume, so it
# survives restarts and updates.
#
# ── Optional: NVIDIA GPU acceleration ─────────────────────────────────────────
#   The bundled Ollama uses the GPU automatically once the container can see it.
#   On the host: install the NVIDIA Container Toolkit, then uncomment the
#   `deploy:` block below and run `docker compose up -d`. No second container.
#   (Verify with: `docker compose logs enzo-ai | grep -i gpu`.)
#
# ── Optional: encrypt chats at rest ───────────────────────────────────────────
#   1.  echo "your-passphrase" > enzo_pass.txt
#       (use the SAME passphrase you choose during onboarding / `enzo-ai register`)
#   2.  uncomment the ENZO_PASSPHRASE_FILE env line, the service `secrets:` list,
#       and the top-level `secrets:` block at the bottom.
#   The app then auto-unlocks on every restart. Without it the app still encrypts,
#   but you unlock it from the web UI after each restart. A copied data volume is
#   useless ciphertext without the passphrase.

services:
  enzo-ai:
    image: ghcr.io/eranabir/enzo-ai:latest
    # build: .                      # ← build locally instead of pulling the image
    container_name: enzo-ai
    restart: unless-stopped
    ports:
      - "1616:1616"                 # Web UI + API
    volumes:
      - enzo-data:/app/data         # DB, uploads, models — keep this!
    environment:
      ENZO_HOST: "0.0.0.0"
      ENZO_PORT: "1616"
      ENZO_DEFAULT_MODEL: "llama3.2:3b"
      # ENZO_PASSPHRASE_FILE: /run/secrets/enzo_passphrase   # ← encryption (see top)
    # secrets:                       # ← uncomment together with ENZO_PASSPHRASE_FILE
    #   - enzo_passphrase
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:1616/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    # ── GPU: uncomment to let the bundled Ollama use an NVIDIA GPU (see top) ──
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - { driver: nvidia, count: all, capabilities: [gpu] }

# Uncomment to enable encryption auto-unlock (see "encrypt chats at rest" above)
# secrets:
#   enzo_passphrase:
#     file: ./enzo_pass.txt

volumes:
  enzo-data:
