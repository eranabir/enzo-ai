version: '3.8'

# Enzo AI — self-hosted local AI
#
# Simple start (Ollama bundled in the image):
#   docker compose up -d
#   open http://localhost:1616
#
# With GPU (NVIDIA) — uses external Ollama for GPU acceleration:
#   docker compose --profile gpu up -d

services:
  enzo-ai:
    image: ghcr.io/eranabir/enzo-ai:latest
    # Or build locally:
    # build: .
    container_name: enzo-ai
    restart: unless-stopped
    ports:
      - "1616:1616"    # Web UI + API
      - "11434:11434"  # Ollama API (optional — expose if needed externally)
    volumes:
      - enzo-data:/app/data   # SQLite DB, uploads, Ollama models — keep this!
    environment:
      ENZO_HOST: "0.0.0.0"
      ENZO_PORT: "1616"
      ENZO_DEFAULT_MODEL: "llama3.2:3b"
      # OLLAMA_URL: "http://ollama:11434"  # uncomment to use external Ollama (GPU profile)
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:1616/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── GPU profile — only used when you run: docker compose --profile gpu up ──
  # Requires NVIDIA Container Toolkit: https://docs.nvidia.com/datacenter/cloud-native/
  ollama-gpu:
    profiles: [gpu]
    image: ollama/ollama:latest
    container_name: enzo-ollama
    restart: unless-stopped
    volumes:
      - enzo-data:/root/.ollama   # share model storage with enzo-ai
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  enzo-data:
